<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Simple E-Commerce Store</h1>

<div class="products">

    <div class="card">
        <h2>Laptop</h2>
        <p>Price: ₹50000</p>
        <button onclick="addToCart('Laptop',50000)">
            Add to Cart
        </button>
    </div>

    <div class="card">
        <h2>Headphones</h2>
        <p>Price: ₹2000</p>
        <button onclick="addToCart('Headphones',2000)">
            Add to Cart
        </button>
    </div>

    <div class="card">
        <h2>Smart Watch</h2>
        <p>Price: ₹3000</p>
        <button onclick="addToCart('Smart Watch',3000)">
            Add to Cart
        </button>
    </div>

</div>

<h2>Shopping Cart</h2>

<div id="cart"></div>

<h3 id="total">Total: ₹0</h3>

<button onclick="clearCart()">Clear Cart</button>

<script src="script.js"></script>

</body>
</html>
